server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/ragdb
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        model: gpt-4o-mini
      embedding:
        model: text-embedding-ada-002

    vectorstore:
      pgvector:
        # Erstellt die Vector-Tabelle automatisch beim Start
        initialize-schema: true
        # Muss zur Embedding-Dimension des Modells passen (ada-002 = 1536)
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        schema-name: public
        table-name: vector_store
