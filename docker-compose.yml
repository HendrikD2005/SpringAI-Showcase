services:

  # ─────────────────────────────────────────────
  # PGVector Database
  # ─────────────────────────────────────────────
  pgvector-db:
    image: pgvector/pgvector:pg16
    container_name: rag-pgvector
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ragdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Spring Application
  # ─────────────────────────────────────────────
  rag-app:
    build: .
    container_name: rag-app
    ports:
      - "8081:8081"
    environment:
      DB_HOST: pgvector-db
      DB_USER: postgres
      DB_PASSWORD: password
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      pgvector-db:
        condition: service_healthy

volumes:
  pgdata:
